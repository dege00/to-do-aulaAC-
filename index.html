<!DOCTYPE html>
<html lang="en">
  <head>
    <title>TO-DO List</title>
    <!-- <link rel="stylesheet" href="style.css" /> -->
  </head>
  <body onload="init()">
    <!-- create a container for the todo list -->
    <div id="todo-container">
      <!-- todo list header -->
      <div id="header">
        <h1>To Do List</h1>
      </div>

      <!-- create input box -->
      <div id="todo-form">
        <input
          type="text"
          class="input-item"
          name="input_box"
          id="input-box"
          placeholder="Add Task"
        />

        <!-- add button -->
        <button id="input-button" onclick="addTask(event)">Add</button>
      </div>

      <!-- task list -->
      <h2>Task List</h2>
      <ul id="list-container"></ul>
    </div>

    <script>
      const taskInput = document.querySelector('#input-box')
      const tasksList = []
      const ul = document.querySelector('ul')

      function addTask(event) {
        event.preventDefault();
        
        taskInputValue = taskInput.value
        taskInput.value = ''
        taskInput.focus()

        tasksList.push(taskInputValue)

        init()

      }

      function deletarTask(task) {
        const index = tasksList.indexOf(task)
        if (index > -1) {
          tasksList.splice(index, 1)
          init()
        }
      }

      function init() {
        const linkDeletar = document.createElement('a').textContent = 'Deletar'
        ul.innerHTML = ''
        tasksList.forEach(function(task){
          const li = document.createElement('li')
          li.innerHTML = `${task} <a href="javascript:deletarTask('${task}')">Deletar</a>`
          ul.appendChild(li)
        })
      }



    </script>
    <!-- <script type="text/javascript" src="script.js"></script> -->
  </body>
</html>
